name: Test Preplexity firmware MI-R3G

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Get variables
        run: |
          sed -i 's|\r$||g' variables build_nilabsent_MI3G.config
          . <(cat variables build_nilabsent_MI3G.config)
          PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
          for v in "${!PADAVAN_@}" "${!CONFIG_@}" "${!ZAPRET_@}"; do
            echo "$v=${!v}" >> "$GITHUB_ENV"
          done

      - name: Debug ZAPRET env
        run: |
          env | grep -E '^ZAPRET_' || echo "no ZAPRET_* in env"

      - name: Download sources and toolchain
        run: |
          git config --global --add safe.directory '*'
          git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
          git -C padavan-ng checkout "$PADAVAN_COMMIT"

          ARCH=""
          case "$PADAVAN_TOOLCHAIN_URL" in
            *.tzst|*.tar.zst) ARCH="--zstd" ;;
            *.txz|*.tar.xz)   ARCH="--xz"   ;;
          esac
          wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng $ARCH -xf - || :

      - name: Build toolchain if missing
        if: ${{ hashFiles('padavan-ng/toolchain/out/mipsel-linux-uclibc/sysroot/lib/libuClibc-*.so') == '' }}
        run: |
          cd padavan-ng/toolchain
          ./clean_sources.sh
          ./build_toolchain.sh

      - name: Replace nfqws from nilabsent/padavan-ng
        run: |
          set -e
          cd padavan-ng/trunk/user

          echo "=== Replacing nfqws directory ==="
          rm -rf nfqws
          mkdir -p nfqws
          cd nfqws

          BASE_URL="https://github.com/nilabsent/padavan-ng/raw/refs/heads/master/trunk/user/nfqws"

          echo "=== Downloading top-level nfqws files ==="
          curl -fsSL "$BASE_URL/Makefile"  -o Makefile
          curl -fsSL "$BASE_URL/zapret.sh" -o zapret.sh
          chmod +x zapret.sh || true

          echo "=== Downloading nfqws zapret tarball (if present) ==="
          curl -fsSL "$BASE_URL/zapret-72.12.tar.gz" -o zapret-72.12.tar.gz || true

          echo "=== Downloading nfqws patches/ ==="
          mkdir -p patches
          curl -fsSL "$BASE_URL/patches/firmware-specific.patch" -o patches/firmware-specific.patch

          echo "=== Downloading nfqws config/ ==="
          mkdir -p config
          mkdir -p config/fake

          curl -fsSL "$BASE_URL/config/exclude.list"   -o config/exclude.list
          curl -fsSL "$BASE_URL/config/post_script.sh" -o config/post_script.sh
          curl -fsSL "$BASE_URL/config/strategy"       -o config/strategy
          curl -fsSL "$BASE_URL/config/strategy0"      -o config/strategy0
          curl -fsSL "$BASE_URL/config/strategy1"      -o config/strategy1
          curl -fsSL "$BASE_URL/config/strategy2"      -o config/strategy2
          curl -fsSL "$BASE_URL/config/strategy3"      -o config/strategy3
          curl -fsSL "$BASE_URL/config/strategy4"      -o config/strategy4
          curl -fsSL "$BASE_URL/config/strategy5"      -o config/strategy5
          curl -fsSL "$BASE_URL/config/strategy6"      -o config/strategy6
          curl -fsSL "$BASE_URL/config/strategy7"      -o config/strategy7
          curl -fsSL "$BASE_URL/config/strategy8"      -o config/strategy8
          curl -fsSL "$BASE_URL/config/strategy9"      -o config/strategy9
          curl -fsSL "$BASE_URL/config/user.list"      -o config/user.list

          curl -fsSL "$BASE_URL/config/fake/hosts"  -o config/fake/hosts  || true
          curl -fsSL "$BASE_URL/config/fake/iplist" -o config/fake/iplist || true

          echo "=== nfqws tree from nilabsent ==="
          ls -R .

      - name: Patch nfqws Makefile to install fake
        run: |
          set -e
          cd padavan-ng/trunk/user/nfqws

          NFQWS_MK="Makefile"

          if ! grep -q 'config/fake' "$NFQWS_MK"; then
            echo "Patching nfqws Makefile to install config/fake into /usr/share/zapret/fake"
            awk '
              /romfs:/ {
                print $0;
                print "\t[ -d config/fake ] && $(ROMFSINST) config/fake /usr/share/zapret/fake || true";
                next
              }
              { print $0 }
            ' "$NFQWS_MK" > "$NFQWS_MK.new"
            mv "$NFQWS_MK.new" "$NFQWS_MK"
          else
            echo "nfqws Makefile already mentions config/fake, skip patch"
          fi

      - name: Replace nfqws2 from nilabsent/padavan-ng
        run: |
          set -e
          cd padavan-ng/trunk/user

          echo "=== Replacing nfqws2 directory ==="
          rm -rf nfqws2
          mkdir -p nfqws2
          cd nfqws2

          BASE2_URL="https://github.com/nilabsent/padavan-ng/raw/refs/heads/master/trunk/user/nfqws2"

          echo "=== Downloading top-level nfqws2 files ==="
          curl -fsSL "$BASE2_URL/Makefile"  -o Makefile
          curl -fsSL "$BASE2_URL/zapret.sh" -o zapret.sh
          chmod +x zapret.sh || true

          echo "=== Downloading nfqws2 zapret2 tarball ==="
          curl -fsSL "$BASE2_URL/zapret2-0.9.4.5.tar.gz" -o zapret2-0.9.4.5.tar.gz || true

          echo "=== Downloading nfqws2 patches/ ==="
          mkdir -p patches
          curl -fsSL "$BASE2_URL/patches/firmware-specific.patch" -o patches/firmware-specific.patch || true

          echo "=== Downloading nfqws2 config/ ==="
          mkdir -p config
          mkdir -p config/fake

          curl -fsSL "$BASE2_URL/config/exclude.list"   -o config/exclude.list   || true
          curl -fsSL "$BASE2_URL/config/post_script.sh" -o config/post_script.sh || true
          curl -fsSL "$BASE2_URL/config/strategy5"      -o config/strategy5      || true
          curl -fsSL "$BASE2_URL/config/strategy6"      -o config/strategy6      || true
          curl -fsSL "$BASE2_URL/config/strategy7"      -o config/strategy7      || true
          curl -fsSL "$BASE2_URL/config/strategy8"      -o config/strategy8      || true
          curl -fsSL "$BASE2_URL/config/strategy9"      -o config/strategy9      || true
          curl -fsSL "$BASE2_URL/config/user.list"      -o config/user.list      || true

          curl -fsSL "$BASE2_URL/config/fake/dht_find_node.bin"                -o config/fake/dht_find_node.bin                || true
          curl -fsSL "$BASE2_URL/config/fake/dht_get_peers.bin"                -o config/fake/dht_get_peers.bin                || true
          curl -fsSL "$BASE2_URL/config/fake/quic_initial_vk_com.bin"          -o config/fake/quic_initial_vk_com.bin          || true
          curl -fsSL "$BASE2_URL/config/fake/stun.bin"                         -o config/fake/stun.bin                         || true
          curl -fsSL "$BASE2_URL/config/fake/tls_clienthello_gosuslugi_ru.bin" -o config/fake/tls_clienthello_gosuslugi_ru.bin || true
          curl -fsSL "$BASE2_URL/config/fake/tls_clienthello_max_ru.bin"       -o config/fake/tls_clienthello_max_ru.bin       || true
          curl -fsSL "$BASE2_URL/config/fake/tls_clienthello_sberbank_ru.bin"  -o config/fake/tls_clienthello_sberbank_ru.bin  || true
          curl -fsSL "$BASE2_URL/config/fake/tls_clienthello_vk_com.bin"       -o config/fake/tls_clienthello_vk_com.bin       || true
          curl -fsSL "$BASE2_URL/config/fake/tls_clienthello_www_google_com.bin" -o config/fake/tls_clienthello_www_google_com.bin || true

          echo "=== nfqws2 tree from nilabsent ==="
          ls -R .

      - name: Patch nfqws2 Makefile to install fake
        run: |
          set -e
          cd padavan-ng/trunk/user/nfqws2

          NFQWS2_MK="Makefile"

          if ! grep -q 'config/fake' "$NFQWS2_MK"; then
            echo "Patching nfqws2 Makefile to install config/fake into /usr/share/zapret2/fake"
            awk '
              /romfs:/ {
                print $0;
                print "\t[ -d config/fake ] && $(ROMFSINST) config/fake /usr/share/zapret2/fake || true";
                next
              }
              { print $0 }
            ' "$NFQWS2_MK" > "$NFQWS2_MK.new"
            mv "$NFQWS2_MK.new" "$NFQWS2_MK"
          else
            echo "nfqws2 Makefile already mentions config/fake, skip patch"
          fi

      - name: Install themes
        run: |
          if [[ -n $PADAVAN_THEMES ]]; then
            git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
            cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

            for theme in $PADAVAN_THEMES; do
              echo "Installing $theme theme"
              cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
            done
          fi

      - name: Run custom pre-build script
        run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

      - name: nfqws / zapret presence check BEFORE build
        run: |
          cd padavan-ng/trunk/user/nfqws
          echo "=== nfqws directory listing BEFORE build (top) ==="
          ls -al
          echo "=== nfqws/config BEFORE build ==="
          ls -al config || echo "no config dir"
          echo "=== nfqws/config/fake BEFORE build ==="
          ls -al config/fake || echo "no config/fake dir"
          echo "=== nfqws tree (recursive) BEFORE build ==="
          ls -R .
          echo "=== zapret* tarballs BEFORE build ==="
          ls -al zapret-*.tar.gz || echo "no zapret-*.tar.gz found (will be downloaded on first nfqws build)"

      - name: nfqws2 / zapret2 presence check BEFORE build
        run: |
          cd padavan-ng/trunk/user/nfqws2
          echo "=== nfqws2 directory listing BEFORE build (top) ==="
          ls -al
          echo "=== nfqws2/config BEFORE build ==="
          ls -al config || echo "no config dir"
          echo "=== nfqws2/config/fake BEFORE build ==="
          ls -al config/fake || echo "no config/fake dir"
          echo "=== nfqws2 tree (recursive) BEFORE build ==="
          ls -R .
          echo "=== zapret2* tarballs BEFORE build ==="
          ls -al zapret2-*.tar.gz || echo "no zapret2-*.tar.gz found (will be used from repo or downloaded by build)"

      - name: Build firmware R3G
        run: |
          cp build_nilabsent_MI3G.config padavan-ng/trunk/.config
          cd padavan-ng/trunk
          ./clear_tree.sh
          ./build_firmware.sh

          FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex '.*\.(trx|bin)$' \
                          -printf '%T@\t%f\n' | sort -V | tail -1 | cut -f2)"
          [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
          echo "FW_FILE_NAME=$FW_FILE_NAME" >> "$GITHUB_ENV"

      - name: Run custom post-build script
        run: '[[ -f post-build.sh ]] && . post-build.sh || :'

      - name: Prepare artifacts
        run: |
          cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
          echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: padavan-ng_${{ env.CONFIG_VENDOR }}_${{ env.CONFIG_FIRMWARE_PRODUCT_ID }}_${{ env.BUILD_TIMESTAMP }}
          retention-days: 7
          path: |
            ${{ env.FW_FILE_NAME }}
            build_nilabsent_MI3G.config

      - name: Check firmware size
        run: |
          partitions="padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"
          max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
          fw_size="$(stat -c %s "$FW_FILE_NAME")"

          if (( fw_size > max_fw_size )); then
            fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
            max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
            echo "Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for your target device"
            exit 1
          fi
