name: Test Preplexity firmware MI-R3G

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Get variables
        run: |
          sed -i 's|\r$||g' variables build_R3G.config
          . <(cat variables build_R3G.config)
          PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
          for v in "${!PADAVAN_@}" "${!CONFIG_@}" "${!ZAPRET_@}"; do
            echo "$v=${!v}" >> "$GITHUB_ENV"
          done

      - name: Debug ZAPRET env
        run: |
          env | grep -E '^ZAPRET_' || echo "no ZAPRET_* in env"

      - name: Download sources and toolchain
        run: |
          git config --global --add safe.directory '*'
          git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
          git -C padavan-ng checkout "$PADAVAN_COMMIT"
          wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

      - name: Override nfqws files from nilabsent/padavan-ng
        run: |
          cd padavan-ng/trunk/user/nfqws

          echo "=== Downloading nfqws Makefile from nilabsent/padavan-ng ==="
          curl -fsSL "https://raw.githubusercontent.com/nilabsent/padavan-ng/refs/heads/master/trunk/user/nfqws/Makefile" -o Makefile

          echo "=== Downloading firmware-specific.patch from nilabsent/padavan-ng ==="
          curl -fsSL "https://github.com/nilabsent/padavan-ng/raw/refs/heads/master/trunk/user/nfqws/patches/firmware-specific.patch" -o patches/firmware-specific.patch

          echo "=== Downloading zapret.sh from nilabsent/padavan-ng ==="
          curl -fsSL "https://raw.githubusercontent.com/nilabsent/padavan-ng/refs/heads/master/trunk/user/nfqws/zapret.sh" -o zapret.sh
          chmod +x zapret.sh

          echo "=== nfqws Makefile (from nilabsent) ==="
          sed -n '1,60p' Makefile || true

          echo "=== firmware-specific.patch (from nilabsent) ==="
          cat patches/firmware-specific.patch || true

      - name: Install themes
        run: |
          if [[ -n $PADAVAN_THEMES ]]; then
            git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
            cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

            for theme in $PADAVAN_THEMES; do
              echo "Installing $theme theme"
              cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
            done
          fi

      - name: Run custom pre-build script
        run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

      - name: Initial nfqws zapret presence check
        run: |
          cd padavan-ng/trunk/user/nfqws
          echo "=== nfqws directory listing BEFORE first build ==="
          ls -al || true
          echo "=== zapret* tarballs BEFORE first build ==="
          ls -al zapret-*.tar.gz || echo "no zapret-*.tar.gz found (will be downloaded on first nfqws build)"

      - name: Build firmware R3G
        run: |
          cp build_R3G.config padavan-ng/trunk/.config
          cd padavan-ng/trunk
          ./clear_tree.sh
          ./build_firmware.sh

          FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex '.*\.(trx|bin)$' \
                          -printf '%T@\t%f\n' | sort -V | tail -1 | cut -f2)"
          [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
          echo "FW_FILE_NAME=$FW_FILE_NAME" >> "$GITHUB_ENV"

      - name: Verify zapret download and extraction after build
        run: |
          cd padavan-ng/trunk/user/nfqws

          echo "=== nfqws directory listing AFTER build ==="
          ls -al

          echo "=== zapret* tarballs AFTER build ==="
          ls -al zapret-*.tar.gz || echo "no zapret-*.tar.gz found"

          # Попробуем автоматически угадать директорию zapret-XX.YY
          ZAPRET_DIR="$(ls -d zapret-* 2>/dev/null | head -n1 || true)"
          if [ -n "$ZAPRET_DIR" ] && [ -d "$ZAPRET_DIR" ]; then
            echo "=== content of $ZAPRET_DIR ==="
            ls -al "$ZAPRET_DIR"
            echo "=== $ZAPRET_DIR/nfq/Makefile ==="
            cat "$ZAPRET_DIR/nfq/Makefile" || echo "no nfq/Makefile"
            echo "=== $ZAPRET_DIR/tpws/Makefile ==="
            cat "$ZAPRET_DIR/tpws/Makefile" || echo "no tpws/Makefile"
          else
            echo "No zapret-*/ directory found after build"
          fi

      - name: Run custom post-build script
        run: '[[ -f post-build.sh ]] && . post-build.sh || :'

      - name: Prepare artifacts
        run: |
          cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
          echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: padavan-ng_${{ env.CONFIG_VENDOR }}_${{ env.CONFIG_FIRMWARE_PRODUCT_ID }}_${{ env.BUILD_TIMESTAMP }}
          retention-days: 7
          path: |
            ${{ env.FW_FILE_NAME }}
            build_R3G.config

      - name: Check firmware size
        run: |
          partitions="padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"
          max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
          fw_size="$(stat -c %s "$FW_FILE_NAME")"

          if (( fw_size > max_fw_size )); then
            fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
            max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
            echo "Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for your target device"
            exit 1
          fi
