name: Test Preplexity firmware MI-R3G

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Get variables
        run: |
          sed -i 's|\r$||g' variables build_R3G.config
          . <(cat variables build_R3G.config)
          PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
          for v in "${!PADAVAN_@}" "${!CONFIG_@}" "${!ZAPRET_@}"; do
            echo "$v=${!v}" >> "$GITHUB_ENV"
          done

      - name: Debug ZAPRET env
        run: |
          env | grep -E '^ZAPRET_' || echo "no ZAPRET_* in env"

      - name: Download sources and toolchain
        run: |
          git config --global --add safe.directory '*'
          git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
          git -C padavan-ng checkout "$PADAVAN_COMMIT"
          wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

      - name: Detect latest zapret v7* tag and patch nfqws Makefile
        run: |
          cd padavan-ng/trunk/user/nfqws

          echo "=== Fetching zapret tags page ==="
          PAGE=$(curl -fsSL https://github.com/bol-van/zapret/tags || true)

          LATEST_TAG=$(
            printf '%s\n' "$PAGE" |
              grep -oE 'v7[0-9]+\.[0-9]+' |
              head -n1 || true
          )

          echo "Raw LATEST_TAG from /tags: '$LATEST_TAG'"

          if [ -z "$LATEST_TAG" ]; then
            echo "ERROR: failed to detect latest v7* tag from /tags"
            exit 1
          fi

          VER_NO_V=$(printf '%s\n' "$LATEST_TAG" | sed -E 's/^v//')
          SRC_DIR_NAME="zapret-$VER_NO_V"

          echo "Will use zapret version: $VER_NO_V"
          echo "Expected zapret source dir: $SRC_DIR_NAME"

          sed -i \
            -e "s/^SRC_VER *= *.*/SRC_VER = $VER_NO_V/" \
            -e "s/^SRC_NAME *= *.*/SRC_NAME = zapret-\$(SRC_VER)/" \
            -e "s|^SRC_URL *= *.*|SRC_URL = https://github.com/bol-van/zapret/archive/refs/tags/v\$(SRC_VER).tar.gz|" \
            Makefile

          echo "=== nfqws Makefile AFTER ==="
          sed -n '1,40p' Makefile || true

          echo "ZAPRET_SRC_DIR=$SRC_DIR_NAME" >> "$GITHUB_ENV"

      - name: Rewrite nfqws patches for detected zapret version
        run: |
          cd padavan-ng/trunk/user/nfqws/patches

          if [ -z "${ZAPRET_SRC_DIR:-}" ]; then
            echo "ZAPRET_SRC_DIR is not set"
            exit 1
          fi

          echo "Patching nfqws patches for zapret dir: $ZAPRET_SRC_DIR"

          if [ -f firmware-specific.patch ]; then
            sed -i \
              -e "s@zapret-71\.2\.orig/@${ZAPRET_SRC_DIR}.orig/@g" \
              -e "s@zapret-71\.2/@${ZAPRET_SRC_DIR}/@g" \
              firmware-specific.patch

            echo "=== firmware-specific.patch AFTER (full) ==="
            cat firmware-specific.patch || true
          else
            echo "firmware-specific.patch not found, skipping"
          fi

          if [ -f nfqws-ipv6-support.patch ]; then
            sed -i \
              -e "s@zapret-71\.orig/@${ZAPRET_SRC_DIR}.orig/@g" \
              -e "s@zapret-71/@${ZAPRET_SRC_DIR}/@g" \
              nfqws-ipv6-support.patch

            echo "=== nfqws-ipv6-support.patch AFTER (full) ==="
            cat nfqws-ipv6-support.patch || true
          else
            echo "nfqws-ipv6-support.patch not found, skipping"
          fi

      - name: Install themes
        run: |
          if [[ -n $PADAVAN_THEMES ]]; then
            git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
            cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

            for theme in $PADAVAN_THEMES; do
              echo "Installing $theme theme"
              cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
            done
          fi

      - name: Run custom pre-build script
        run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

      - name: Initial nfqws zapret presence check
        run: |
          cd padavan-ng/trunk/user/nfqws
          echo "=== nfqws directory listing BEFORE first build ==="
          ls -al || true
          echo "=== zapret* tarballs BEFORE first build ==="
          ls -al zapret-*.tar.gz || echo "no zapret-*.tar.gz found (will be downloaded on first nfqws build)"
          if [ -n "${ZAPRET_SRC_DIR:-}" ]; then
            echo "=== ${ZAPRET_SRC_DIR} BEFORE first build (if exists) ==="
            if [ -d "${ZAPRET_SRC_DIR}" ]; then
              ls -al "${ZAPRET_SRC_DIR}"
            else
              echo "Directory ${ZAPRET_SRC_DIR} not found (will be created on first nfqws build)"
            fi
          fi

      - name: Build firmware R3G
        run: |
          cp build_R3G.config padavan-ng/trunk/.config
          cd padavan-ng/trunk
          ./clear_tree.sh
          ./build_firmware.sh

          FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex '.*\.(trx|bin)$' \
                          -printf '%T@\t%f\n' | sort -V | tail -1 | cut -f2)"
          [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
          echo "FW_FILE_NAME=$FW_FILE_NAME" >> "$GITHUB_ENV"

      - name: Verify zapret download and extraction after build
        run: |
          cd padavan-ng/trunk/user/nfqws

          echo "=== nfqws directory listing AFTER build ==="
          ls -al

          echo "=== zapret* tarballs AFTER build ==="
          ls -al zapret-*.tar.gz || echo "no zapret-*.tar.gz found"

          if [ -n "${ZAPRET_SRC_DIR:-}" ]; then
            echo "=== ${ZAPRET_SRC_DIR} AFTER build (if exists) ==="
            if [ -d "${ZAPRET_SRC_DIR}" ]; then
              ls -al "${ZAPRET_SRC_DIR}"
              echo "=== ${ZAPRET_SRC_DIR}/nfq/Makefile ==="
              cat "${ZAPRET_SRC_DIR}/nfq/Makefile" || echo "no nfq/Makefile"
              echo "=== ${ZAPRET_SRC_DIR}/tpws/Makefile ==="
              cat "${ZAPRET_SRC_DIR}/tpws/Makefile" || echo "no tpws/Makefile"
            else
              echo "Directory ${ZAPRET_SRC_DIR} still not found — nfqws build may not have been triggered"
            fi
          else
            echo "ZAPRET_SRC_DIR is not set, cannot check unpacked zapret directory"
          fi

      - name: Run custom post-build script
        run: '[[ -f post-build.sh ]] && . post-build.sh || :'

      - name: Prepare artifacts
        run: |
          cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
          echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: padavan-ng_${{ env.CONFIG_VENDOR }}_${{ env.CONFIG_FIRMWARE_PRODUCT_ID }}_${{ env.BUILD_TIMESTAMP }}
          retention-days: 7
          path: |
            ${{ env.FW_FILE_NAME }}
            build_R3G.config

      - name: Check firmware size
        run: |
          partitions="padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"
          max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
          fw_size="$(stat -c %s "$FW_FILE_NAME")"

          if (( fw_size > max_fw_size )); then
            fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
            max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
            echo "Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for your target device"
            exit 1
          fi
